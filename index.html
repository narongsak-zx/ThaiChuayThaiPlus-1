    // [FIX 2] เพิ่ม guard ให้แน่นขึ้น ป้องกัน crash เมื่อ input ไม่ถูกต้อง
    const getSafeDateObj = (dateStr, timeStr) => {
      try {
        if (!dateStr || !timeStr || typeof dateStr !== 'string' || typeof timeStr !== 'string') return new Date();
        const dateParts = dateStr.split('-');
        const timeParts = timeStr.split(':');
        if (dateParts.length < 3 || timeParts.length < 2) return new Date();
        const [y, m, d] = dateParts.map(Number);
        const [hr, min] = timeParts.map(Number);
        if (!y || !m || !d || isNaN(hr) || isNaN(min)) return new Date();
        const dateObj = new Date(y, m - 1, d, hr, min);
        return isNaN(dateObj.getTime()) ? new Date() : dateObj;
      } catch (e) { return new Date(); }
    };

    const getQuotaDateString = (dateObj = new Date()) => {
      try {
        if (!(dateObj instanceof Date) || isNaN(dateObj.getTime())) {
          const now = new Date();
          return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }
        const d = new Date(dateObj.getTime());
        if (d.getHours() > 23 || (d.getHours() === 23 && d.getMinutes() >= 1)) d.setDate(d.getDate() + 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      } catch (e) {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      }
    };

    const getFullMonthName = (monthStr) => {
      try {
        const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        return months[parseInt(monthStr, 10) - 1] || "";
      } catch(e) { return ""; }
    };

    const getShortMonthName = (monthIdx) => {
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      return months[monthIdx] || "";
    };

    const formatGroupHeader = (key, filterType) => {
      try {
        if (filterType === 'month' && key) {
          const [y, m, d] = key.split('-');
          return `${parseInt(d)} ${getFullMonthName(m)} ${parseInt(y) + 543}`;
        } else if (filterType === 'all' && key) {
          const [y, m] = key.split('-');
          return `${getFullMonthName(m)} ${parseInt(y) + 543}`;
        }
        return key || "";
      } catch(e) { return "รายการ"; }
    };

    const formatDisplayTimeObj = (d) => {
      try {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')} น.`;
      } catch(e) { return ''; }
    };
    
    const formatDisplayDateObj = (d) => {
      try {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear() + 543;
        return `${day}/${month}/${year}`;
      } catch(e) { return ''; }
    };

    const formatNumber = (num) => {
      try {
        if (isNaN(num) || num === null || num === undefined) return '0.00';
        return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      } catch(e) { return '0.00'; }
    };

    const generateSessionToken = () => {
       return Math.random().toString(36).substring(2) + Date.now().toString(36);
    };

    const calculateDaysLeft = (dateStr) => {
      try {
        if(!dateStr) return -1;
        const exp = new Date(dateStr);
        if (isNaN(exp.getTime())) return -1;
        const today = new Date();
        exp.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        const diffTime = exp - today;
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      } catch(e) { return -1; }
    };

    const compressImage = (file, maxWidth = 800) => {
        return new Promise((resolve, reject) => {
            const objectUrl = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(objectUrl);
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                resolve(base64);
            };
            img.onerror = () => {
                URL.revokeObjectURL(objectUrl);
                reject(new Error("แอปโหลดรูปภาพไม่สำเร็จ"));
            };
            img.src = objectUrl;
        });
    };

    const analyzeSlipWithGas = async (file) => {
        if (!gasUrl || gasUrl.trim() === "" || gasUrl === "ใส่_URL_ที่ได้จาก_Google_Apps_Script_ตรงนี้") {
             throw new Error("ยังไม่ได้ตั้งค่าลิงก์ Apps Script ในโค้ดหน้าเว็บครับ");
        }

        const base64Data = await compressImage(file);
        let response;

        try {
            response = await fetch(gasUrl, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    imageBase64: base64Data,
                    mimeType: file.type || "image/jpeg"
                })
            });
        } catch (err) {
            throw new Error("การเชื่อมต่อขัดข้อง กรุณาตรวจสอบอินเทอร์เน็ต");
        }

        if (!response.ok) {
            throw new Error(`เซิร์ฟเวอร์หลังบ้านขัดข้อง (Status: ${response.status})`);
        }

        const textResult = await response.text();
        let result;
        
        try {
            result = JSON.parse(textResult);
        } catch(e) {
            throw new Error("ข้อมูลจากเซิร์ฟเวอร์หลังบ้านผิดปกติ");
        }

        if (result.error) {
            throw new Error(result.message);
        }

        return result;
    };

    // [FIX 3] Error Boundary ครอบ App ทั้งหมด ถ้า crash จะโชว์หน้า error แทนหน้าขาว
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('App crashed:', error, info);
      }
      handleReset() {
        // ล้าง localStorage ที่อาจเสีย แล้ว reload
        try {
          localStorage.removeItem('tct_transactions_v2');
        } catch(e) {}
        window.location.reload();
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',background:'#f8fafc',padding:'20px',flexDirection:'column',gap:'16px',fontFamily:'Prompt,sans-serif',textAlign:'center'}}>
              <div style={{fontSize:'48px'}}>⚠️</div>
              <h2 style={{fontWeight:'900',color:'#1e293b',fontSize:'18px',margin:0}}>แอปเกิดข้อผิดพลาด</h2>
              <p style={{color:'#64748b',fontSize:'12px',margin:0,lineHeight:'1.6'}}>ข้อมูลใน cache อาจเสียหาย<br/>กดปุ่มด้านล่างเพื่อรีเซ็ตและโหลดใหม่</p>
              <button
                onClick={() => this.handleReset()}
                style={{background:'#2563eb',color:'white',border:'none',padding:'12px 24px',borderRadius:'12px',fontWeight:'700',fontSize:'14px',cursor:'pointer',fontFamily:'Prompt,sans-serif'}}
              >
                รีเซ็ตและโหลดใหม่
              </button>
              <p style={{color:'#94a3b8',fontSize:'10px',margin:0}}>(ประวัติการใช้จ่ายจะถูกลบออก)</p>
            </div>
          );
        }
        return this.props.children;
      }
    }

             if (result.success) {
                const userObj = { username: result.username, expiryDate: result.expiryDate };
                
                try { localStorage.setItem('tct_current_user', JSON.stringify(userObj)); } catch(e) {}
                setIsSubscribed(true);
                
                const daysLeft = calculateDaysLeft(userObj.expiryDate);
                
                if (daysLeft >= 0) {
                  setShowAuthModal(false);
                  setTimeout(() => fileInputRef.current?.click(), 300); 
                } else {
                  setAuthMode('packages'); 
                }
             } else {
                setAuthError(result.message);
                if (result.errorType === 'active_session') {
                   setShowForceLoginBtn(true);
                }
             }
          }
        } catch (err) {
          setAuthError('ไม่สามารถเชื่อมต่อระบบฐานข้อมูลได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง');
        } finally {
          setIsScanningUI(false);
        }
      };

      const handleSelectPackage = (pkgId) => {
        setSelectedPackage(pkgId);
        setPaymentSlip(null); 
        setQrTimeLeft(300); 
        setIsQrExpired(false);
        setAuthMode('qr');
      };

      const verifyPaymentAutomatically = async () => {
        if (!paymentSlip) {
           setAuthError('กรุณาแนบหลักฐานการโอนเงิน (e-Slip) เพื่อดำเนินการตรวจสอบ');
           return;
        }
        
        setAuthError('');
        setTimeout(() => setIsScanningUI(true), 50); 
        showToastMessage('ระบบกำลังตรวจสอบหลักฐานการชำระเงิน...', 'success');
        
        try {
          const base64Data = await compressImage(paymentSlip);
          const selectedOption = PACKAGE_OPTIONS.find(p => p.id === selectedPackage);
          const expectedAmount = selectedOption ? selectedOption.price : 0;
          const monthsToAdd = selectedOption ? selectedOption.months : 1;
          
          let tempUser = null;
          try { tempUser = JSON.parse(localStorage.getItem('tct_temp_user')); } catch(e) {}
          const currentUser = getCurrentUser();
          const targetUser = tempUser || currentUser;
          
          if(!targetUser) throw new Error("ไม่พบข้อมูลผู้ใช้งาน");

          let currentToken = null;
          try { currentToken = localStorage.getItem('tct_session_token'); } catch(e) {}

          const response = await fetch(slipOkGasUrl, {
              method: "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body: JSON.stringify({
                  action: 'verifyPayment',
                  imageBase64: base64Data,
                  amount: expectedAmount,
                  username: targetUser.username,
                  password: targetUser.password || "", 
                  isNewUser: tempUser ? true : false,
                  monthsToAdd: monthsToAdd,
                  sessionToken: currentToken,
                  promptpayId: PROMPTPAY_ID 
              })
          });

          if (!response.ok) throw new Error("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ตรวจสอบ");

          const result = await response.json();

          if (result.success === true) {
             const finalUser = { username: targetUser.username, expiryDate: result.newExpiryDate };
             try { localStorage.setItem('tct_current_user', JSON.stringify(finalUser)); } catch(e) {}
             try { localStorage.removeItem('tct_temp_user'); } catch(e) {}

             setIsSubscribed(true);
             setShowAuthModal(false);
             setShowProfileModal(false); 
             showToastMessage('ชำระค่าบริการสำเร็จ! ระบบพร้อมใช้งานแล้ว', 'success');
             
             setTimeout(() => fileInputRef.current?.click(), 400);
          } else {
             setAuthError(result.message || 'หลักฐานการชำระเงินไม่ถูกต้อง หรือข้อมูลไม่ตรงกับแพ็กเกจ');
             showToastMessage('การตรวจสอบรายการล้มเหลว', 'error');
          }
        } catch (err) {
          setAuthError('เครือข่ายมีปัญหาหรือไม่สามารถเชื่อมต่อระบบตรวจสอบได้ กรุณาลองใหม่อีกครั้ง');
          showToastMessage('ข้อผิดพลาดทางเครือข่าย', 'error');
        } finally {
          setIsScanningUI(false);
        }
      };

      const handleFileUpload = async (e) => {
        if (isScanningRef.current) return;
        
        const file = e.target.files?.[0];
        if (!file) return;

        isScanningRef.current = true;
        setIsScanningUI(true); 
        
        try { e.target.value = ''; } catch(err) {} 
        const fallbackDateObj = new Date(file.lastModified);

        try {
          const aiData = await analyzeSlipWithGas(file);

          if (!aiData || typeof aiData !== 'object') {
             throw new Error("ระบบคืนค่าข้อมูลกลับมาไม่ถูกต้อง");
          }

          if (aiData.isValidSlip === false) {
             showToastMessage('ภาพนี้ไม่ใช่สลิปโครงการไทยช่วยไทยพลัส', 'error');
             return;
          }

          const fallbackDate = !isNaN(fallbackDateObj.getTime()) 
            ? `${fallbackDateObj.getFullYear()}-${String(fallbackDateObj.getMonth()+1).padStart(2,'0')}-${String(fallbackDateObj.getDate()).padStart(2,'0')}`
            : selectedDate;
          const fallbackTime = !isNaN(fallbackDateObj.getTime())
            ? `${String(fallbackDateObj.getHours()).padStart(2,'0')}:${String(fallbackDateObj.getMinutes()).padStart(2,'0')}`
            : selectedTime;

          const finalDate = aiData.date || fallbackDate;
          const finalTime = aiData.time || fallbackTime;

          const isDuplicate = transactions.some(tx => {
             if (aiData.referenceNo && tx.referenceNo === aiData.referenceNo) return true;
             if (tx.slipDate === finalDate && tx.slipTime === finalTime && tx.totalValue === aiData.totalAmount) return true;
             return false;
          });

          if (isDuplicate) {
             showToastMessage('สลิปนี้ถูกบันทึกไปแล้ว', 'warning');
             return;
          }

          if (aiData.totalAmount != null) setSaveInputValue(String(aiData.totalAmount));
          
          if (aiData.govtSubsidy != null && aiData.userPayment != null) {
            setScannedGovtPays(String(aiData.govtSubsidy));
            setScannedUserPays(String(aiData.userPayment));
          }

          if (aiData.referenceNo != null) setScannedRefNo(String(aiData.referenceNo));

          setSelectedDate(finalDate);
          setSelectedTime(finalTime);

          showToastMessage('ดึงข้อมูลจากสลิปสำเร็จ!', 'success');

        } catch (err) {
          console.error("Scanner Error:", err);
          showToastMessage(`${err.message}`, 'error');
        } finally {
          isScanningRef.current = false;
          setIsScanningUI(false);
        }
      };

      const filteredTransactions = transactions.filter(t => {
        if (!t.quotaDate) return false;
        if (historyFilter === 'today') return t.quotaDate === currentQuotaDateStr;
        if (historyFilter === 'month') return t.quotaDate.startsWith(currentQuotaMonth);
        return true; 
      });

      const renderHistoryList = () => {
        if (filteredTransactions.length === 0) {
          return (
            <div className="text-center py-10">

                    <div className="space-y-2">

                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-[9px] font-bold text-white bg-gray-800 px-2 py-0.5 rounded-md">
                                {tx.slipTime || formatDisplayTimeObj(new Date(tx.timestamp))}
                              </span>
                              {tx.inputType === 'ai_vision' && <span className="text-[8px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded-md flex items-center gap-0.5"><Icons.DocumentCheck className="w-2.5 h-2.5"/> สลิป</span>}
                            </div>
                            <p className="text-[11px] font-bold text-gray-800 mb-0.5">รวม {formatNumber(tx.totalValue)} บาท</p>

                            <Icons.Trash />
                          </button>

        }

        if (historyFilter === 'all') {
           const monthsObj = {};
           filteredTransactions.forEach(tx => {

             if (!monthsObj[mKey]) monthsObj[mKey] = [];
             monthsObj[mKey].push(tx);

           const sortedMonths = Object.keys(monthsObj).sort((a,b) => b.localeCompare(a));

           return (
             <div className="space-y-3">
                {sortedMonths.map(monthKey => {
                   const monthTxs = monthsObj[monthKey];
                   const monthGovt = monthTxs.reduce((s,t) => s + (t.govtPays||0), 0);
                   const isExpanded = expandedMonth === monthKey;
                   
                   const daysInMonth = {};
                   if (isExpanded) {
                     monthTxs.forEach(tx => {
                       if(!daysInMonth[tx.quotaDate]) daysInMonth[tx.quotaDate] = [];
                       daysInMonth[tx.quotaDate].push(tx);
                     });
                   }
                   const sortedDaysInMonth = Object.keys(daysInMonth).sort((a,b) => b.localeCompare(a));

                   return (
                     <div key={monthKey} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                       <button
                         className="w-full px-3 py-3 flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition active:scale-[0.98]"
                         onClick={() => setExpandedMonth(isExpanded ? null : monthKey)}
                       >
                         <div className="flex flex-col items-start">
                           <span className="text-[13px] font-extrabold text-gray-800">{formatGroupHeader(monthKey, 'all')}</span>
                           <span className="text-[10px] font-semibold text-gray-500">{monthTxs.length} รายการ</span>
                         </div>
                         <div className="flex items-center gap-3">
                           <div className="flex flex-col items-end">
                             <span className="text-[10px] font-bold text-gray-500">สิทธิไทยช่วยไทยพลัส</span>
                             <span className="text-xs font-black text-[#2b9e57]">{formatNumber(monthGovt)} บาท</span>
                           </div>
                           <div className={`text-gray-400 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                             <Icons.ChevronDown />
                           </div>
                         </div>
                       </button>

                       {isExpanded && (
                         <div className="p-3 bg-white space-y-4 border-t border-gray-100">
                            {sortedDaysInMonth.map(dayKey => (
                              <div key={dayKey}>
                                <h4 className="text-[10px] font-extrabold text-gray-500 mb-2 px-1 border-b border-gray-100 pb-1">
                                  {formatGroupHeader(dayKey, 'month')}
                                </h4>
                                <div className="space-y-2">
                                  {daysInMonth[dayKey].map(tx => (
                                    <div key={tx.id} className="bg-gray-50 p-2.5 rounded-lg border border-gray-100 flex items-center justify-between">
                                      <div>
                                        <div className="flex items-center gap-2 mb-1">
                                          <span className="text-[9px] font-bold text-white bg-gray-600 px-1.5 py-0.5 rounded">
                                            {tx.slipTime || formatDisplayTimeObj(new Date(tx.timestamp))}
                                          </span>
                                          {tx.inputType === 'ai_vision' && <span className="text-[8px] ml-1 font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-1 py-0.5 rounded-md flex items-center gap-0.5"><Icons.DocumentCheck className="w-2.5 h-2.5"/> สลิป</span>}
                                        </div>
                                        <p className="text-[11px] font-bold text-gray-800 mb-0.5">รวม {formatNumber(tx.totalValue)} บาท</p>
                                        <p className="text-[9px] text-gray-500 font-medium">
                                          G-Wallet {formatNumber(tx.userPays)} บาท | <span className="text-[#2b9e57] font-bold">สิทธิไทยช่วยไทยพลัส {formatNumber(tx.govtPays)} บาท</span>
                                        </p>
                                      </div>
                                      <button onClick={() => setDeleteConfirmId(tx.id)} className="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded transition" aria-label="ลบรายการ">
                                        <Icons.Trash />
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            ))}
                         </div>
                       )}
                     </div>
                   );
                })}
             </div>
           );
        }
      };

      const renderProfileStatus = () => {
         const user = getCurrentUser();
         if (!user) return null;

         const daysLeft = calculateDaysLeft(user.expiryDate);

         if (daysLeft < 0) {
            return (
               <div>
                  <span className="inline-flex items-center gap-1 bg-red-100 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded-md mb-1">
                     <Icons.XCircle className="w-3 h-3"/> สถานะ: แพ็กเกจหมดอายุ
                  </span>
                  <p className="text-[11px] font-bold text-gray-800 mt-1">กรุณาต่ออายุแพ็กเกจเพื่อใช้งานระบบต่อ</p>
                  <button onClick={(e) => { e.preventDefault(); openAuthModalSafe('packages'); }} className="mt-3 w-full py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-sm hover:bg-indigo-700 active:scale-95">ต่ออายุการใช้งานแพ็กเกจ</button>
               </div>
            );
         } else if (daysLeft >= 0 && daysLeft <= 3) {
            return (
               <div>
                  <span className="inline-flex items-center gap-1 bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-0.5 rounded-md mb-1">
                     <Icons.AlertCircle className="w-3 h-3"/> สถานะ: ใกล้หมดอายุ (เหลือ {daysLeft} วัน)
                  </span>
                  <p className="text-[11px] font-bold text-gray-800 mt-1">ใช้งานได้ถึงวันที่: {new Date(user.expiryDate).toLocaleDateString('th-TH')}</p>
                  <button onClick={(e) => { e.preventDefault(); openAuthModalSafe('packages'); }} className="mt-3 w-full py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-sm hover:bg-indigo-700 active:scale-95">ต่ออายุล่วงหน้า</button>
               </div>
            );
         } else {
            return (
               <div>
                  <span className="inline-flex items-center gap-1 bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-md mb-1">
                     <Icons.Check className="w-3 h-3"/> สถานะ: ใช้งานได้ปกติ
                  </span>
                  <p className="text-[11px] font-bold text-gray-800 mt-1">ใช้งานได้ถึงวันที่: {new Date(user.expiryDate).toLocaleDateString('th-TH')}</p>
                  <button onClick={(e) => { e.preventDefault(); openAuthModalSafe('packages'); }} className="mt-3 w-full py-2 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg shadow-sm hover:bg-gray-200 active:scale-95">ต่ออายุการใช้งานแพ็กเกจ</button>
               </div>
            );
         }
      };

      return (
        <div className="flex justify-center items-center h-[100dvh] w-screen max-w-[100vw] select-none overflow-hidden bg-gray-200 font-sans relative">
          
          {toastData.show && (
            <div className="absolute top-8 left-0 right-0 z-[60] flex justify-center animate-slide-down px-4 pointer-events-none">
              <div className={`backdrop-blur-md text-white px-5 py-2.5 rounded-full shadow-lg flex items-center justify-center gap-2 max-w-[90%] border ${toastData.type === 'error' ? 'bg-red-600/95 border-red-700/50' : 'bg-gray-800/95 border-gray-700/50'}`}>
                <span className="text-xs sm:text-sm font-bold">{toastData.msg}</span>
              </div>
            </div>
          )}

          <div className="w-full max-w-[420px] h-[100dvh] bg-[#f8fafc] flex flex-col shadow-2xl relative overflow-hidden sm:max-h-[850px] sm:rounded-3xl sm:border-[6px] sm:border-gray-900">
            
            <div className="absolute top-0 left-0 right-0 h-[18%] bg-[#3b82f6] rounded-b-[2rem] z-0"></div>

            <div className="w-full pt-4 pb-1 px-4 flex justify-between items-center z-10 shrink-0">
              <img src="https://img2.pic.in.th/-85_20260607183516.png" alt="โลโก้ไทยช่วยไทย" className="h-14 sm:h-16 w-auto object-contain drop-shadow-sm" />
              <div className="flex gap-1.5">
                <button onClick={() => { setHistoryFilter('today'); setShowHistory(true); }} className="flex items-center gap-1 bg-white text-gray-700 px-2.5 py-1.5 rounded-xl shadow-sm text-[10px] font-bold active:scale-95">
                  <Icons.Clock className="w-3 h-3" /> ประวัติ

                <button onClick={openSaveModal} className="flex items-center gap-1 bg-white text-gray-700 px-2.5 py-1.5 rounded-xl shadow-sm text-[10px] font-bold active:scale-95">
                  <Icons.Bookmark className="w-3 h-3" /> บันทึก
                </button>
                <button onClick={() => setShowProfileModal(true)} className="flex items-center justify-center bg-indigo-50 text-indigo-600 px-2 py-1.5 rounded-xl shadow-sm border border-indigo-100 active:scale-95">
                  <Icons.UserCircle className="w-[18px] h-[18px]" />
                </button>
              </div>
            </div>

            <div className="flex-1 flex flex-col px-4 pb-1 z-10 gap-1.5 overflow-hidden no-scrollbar">
              
              <div className="shrink-0 rounded-2xl p-4 shadow-sm relative flex flex-col justify-center min-h-[95px] bg-cover bg-center border border-green-100" 
                   style={{ backgroundImage: "url('https://img2.pic.in.th/FC981FAA-0FA9-47B7-8F6E-D630431C0577.jpeg')", backgroundColor: '#f0fdf4' }}>
                <div className="relative z-10">
                  <div className="flex items-center gap-1 text-gray-600 mb-0.5">
                    <span className="text-[10px] font-bold">สิทธิวันนี้คงเหลือ</span>
                    <Icons.Info className="w-3.5 h-3.5 text-gray-400" />
                  </div>
                  <div className="flex items-baseline mb-0.5">
                    <span className="text-lg font-bold text-[#2b9e57] mr-1">฿</span>
                    <span className="text-3xl leading-none font-black text-[#2b9e57] tracking-tight">{formatNumber(remainingQuota)}</span>
                  </div>
                  <div className="text-[9px] text-gray-600 font-medium mt-1">
                    ใช้จ่ายได้สูงสุด <span className="text-[#2b9e57] font-bold">฿ {formatNumber(maxPurchasingPower)}</span>
                  </div>
                </div>
              </div>

              <div className="shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                  <div className="flex justify-between items-start mb-0.5">
                    <span className="text-[10px] font-bold text-gray-700">สิทธิเดือนนี้ (1 - {lastDayOfMonth} {shortMonthName})</span>
                  </div>
                  <div className="flex items-baseline mb-1.5">
                    <span className="text-lg font-bold text-[#2563eb] mr-1">฿</span>
                    <span className="text-2xl font-black text-[#2563eb]">{formatNumber(remainingMonthlyQuota)}</span>
                    <span className="text-[9px] font-bold text-[#2563eb] ml-2">คงเหลือ</span>

                  <div className="w-full bg-[#f1f5f9] h-1.5 rounded-full overflow-hidden mb-1">
                    <div className="h-full bg-[#2563eb] rounded-full" style={{ width: `${(usedQuotaMonth / MAX_MONTHLY_SUBSIDY) * 100}%` }}></div>
                  </div>
                  <div className="flex justify-between text-[9px] text-gray-500 font-medium">
                    <span>ใช้ไป ฿ {formatNumber(usedQuotaMonth)}</span>
                    <span>เหลือ ฿ {formatNumber(remainingMonthlyQuota)} / ฿ {formatNumber(MAX_MONTHLY_SUBSIDY)}</span>
                  </div>
                </div>

                              {paymentSlip ? `แนบหลักฐานเรียบร้อย: ${paymentSlip.name.substring(0,12)}...` : 'แนบหลักฐานการโอนเงิน (e-Slip)'}
                           </label>
                           {authError && <p className="text-[10px] text-red-500 font-bold mb-2 leading-tight">{authError}</p>}
                        </div>

                        <div className="w-full flex gap-2 mt-2">
                           <button onClick={(e) => { e.preventDefault(); setAuthMode('packages'); setPaymentSlip(null); }} className={`flex-1 py-3 bg-gray-100 text-gray-600 font-bold text-xs rounded-xl transition-all ${isScanningUI ? 'opacity-50 pointer-events-none' : 'hover:bg-gray-200 active:scale-95'}`}>ย้อนกลับ</button>
                           <button onClick={(e) => { e.preventDefault(); verifyPaymentAutomatically(); }} className={`flex-[2] py-3 bg-[#2b9e57] text-white font-bold text-xs rounded-xl shadow-lg shadow-green-500/30 flex justify-center items-center gap-1 transition-all ${isScanningUI || isQrExpired ? 'opacity-50 pointer-events-none' : 'hover:bg-green-600 active:scale-95'}`}>
                              {isScanningUI ? <Icons.Loader className="w-4 h-4 text-white" /> : 'ยืนยันและตรวจสอบสลิป'}
                           </button>
                        </div>
                      </div>
                    )}
                 </div>
              </div>
            )}

            {showSaveModal && (
              <div className="absolute inset-0 z-40 flex flex-col justify-end animate-fade-in bg-black/40 backdrop-blur-sm">
                <div className="flex-1" onClick={() => setShowSaveModal(false)}></div>
                
                {isScanningUI && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center bg-gray-900/10 backdrop-blur-[2px] animate-fade-in px-5">
                    <div className="bg-white shadow-2xl border border-gray-100 rounded-2xl p-4 flex items-center gap-4 w-full max-w-[340px] animate-slide-up">
                        <div className="bg-indigo-50 p-2.5 rounded-full text-indigo-600 flex-shrink-0">
                           <Icons.Loader className="w-6 h-6" />
                        </div>
                        <div className="flex flex-col text-left">
                           <span className="text-sm font-black text-gray-800">กรุณารอสักครู่...</span>
                           <span className="text-[10px] text-gray-500 font-medium mt-0.5">ระบบกำลังประมวลผลข้อมูล</span>
                        </div>
                    </div>
                  </div>
                )}

                <div className="bg-white w-full rounded-t-[2rem] pt-5 pb-safe px-5 shadow-2xl animate-slide-up flex flex-col relative" onClick={(e) => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2 text-blue-600">
                      <Icons.Pen /><h2 className="text-lg font-black text-gray-800">บันทึกรายการใช้จ่าย</h2>
                    </div>
                    <button onClick={() => setShowSaveModal(false)} className="p-2 bg-gray-100 rounded-full text-gray-500 active:scale-95"><Icons.X /></button>
                  </div>

                  <div className="mb-4">
                    <button 
                      onClick={handleTriggerFileInput}
                      className={`w-full py-2.5 flex items-center justify-center gap-2 font-bold text-xs rounded-xl shadow-sm transition-all ${isScanningUI ? 'bg-gray-100 text-gray-400 border border-gray-200 pointer-events-none' : 'bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 active:scale-95'}`}
                    >
                      <Icons.Camera className="w-4 h-4 mr-1" /> สแกนสลิปด้วย AI 
                    </button>
                    <input type="file" accept="image/*" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                  </div>

                  <div className="flex gap-3 mb-4">
                    <div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-2.5 relative">
                      <label className="text-[9px] font-bold text-gray-400 uppercase tracking-wide block mb-1 ml-1">วันที่ทำรายการ</label>
                      <div className="flex items-center gap-1.5 bg-white p-1.5 rounded-lg border border-gray-100 shadow-sm">
                        <Icons.Calendar className="text-gray-400" />
                        <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="w-full text-xs font-bold text-gray-700 bg-transparent focus:outline-none" />
                      </div>
                    </div>
                    <div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-2.5 relative">
                      <label className="text-[9px] font-bold text-gray-400 uppercase tracking-wide block mb-1 ml-1">เวลา</label>
                      <div className="flex items-center gap-1.5 bg-white p-1.5 rounded-lg border border-gray-100 shadow-sm">
                        <Icons.Clock className="text-gray-400" />
                        <input type="time" value={selectedTime} onChange={(e) => setSelectedTime(e.target.value)} className="w-full text-xs font-bold text-gray-700 bg-transparent focus:outline-none" />
                      </div>
                    </div>
                  </div>
                  
                  <p className="text-xs font-semibold text-gray-500 mb-1.5">มูลค่าการใช้จ่าย</p>
                  
                  <div className="bg-gray-50 border-2 border-blue-200 rounded-xl p-3 flex items-center mb-4 relative overflow-hidden">
                    <span className="text-xl font-bold text-gray-400 mr-2 shrink-0">฿</span>
                    <input 
                      ref={saveInputRef} 
                      type="text" 
                      inputMode="decimal" 
                      value={saveInputValue} 
                      onChange={handleSaveInputChange} 
                      className="w-full text-3xl font-black text-blue-700 bg-transparent focus:outline-none p-0 pr-8" 
                      placeholder="0" 
                    />
                    {saveInputValue && (
                      <button 
                        type="button"
                        onMouseDown={(e) => e.preventDefault()}
                        onTouchStart={(e) => e.preventDefault()}
                        onClick={clearSaveInput} 
                        className="absolute right-3 flex-shrink-0 bg-gray-300 hover:bg-gray-400 text-white rounded-full flex items-center justify-center w-6 h-6 transition-colors z-10 active:scale-95"
                      >
                        <Icons.X className="w-3.5 h-3.5" />
                      </button>
                    )}
                  </div>

                  <div className="bg-gray-50 rounded-xl p-3 mb-4 border border-gray-100 space-y-2">
                     <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-[#2b9e57]">รัฐช่วยจ่าย (หักโควตา {formatDisplayDateObj(selectedDateTimeObj)})</span>
                        <span className={`text-base font-black ${saveInputValue ? 'text-[#2b9e57]' : 'text-gray-300'}`}>- {formatNumber(saveGovtPaysPreview)} ฿</span>
                     </div>
                     <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-[#2563eb]">เป๋าตัง (จ่ายเอง)</span>
                        <span className={`text-base font-black ${saveInputValue ? 'text-[#2563eb]' : 'text-gray-300'}`}>- {formatNumber(saveUserPaysPreview)} ฿</span>
                     </div>
                  </div>

                  <button onClick={(e) => { e.preventDefault(); confirmSaveTransaction(); }} className={`h-12 w-full rounded-xl flex items-center justify-center transition-all text-base font-bold mb-2 ${saveInputValue && saveTotalValuePreview > 0 ? 'bg-[#2563eb] text-white shadow-lg shadow-blue-500/30 active:scale-95' : 'bg-gray-200 text-gray-400 pointer-events-none'}`}>
                    บันทึก
                  </button>
                </div>
              </div>
            )}

            {showHistory && (
              <div className="absolute inset-0 z-50 flex flex-col bg-gray-50 animate-slide-up">
                <div className="pt-10 sm:pt-12 pb-3 px-4 bg-white border-b border-gray-200 flex justify-between items-center shadow-sm">
                  <h2 className="text-lg font-black text-gray-800">ประวัติการใช้สิทธิ</h2>
                  <button onClick={() => setShowHistory(false)} className="p-2 bg-gray-100 rounded-full text-gray-600 active:scale-95"><Icons.X /></button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 pb-safe bg-gray-50">
                  <div className="flex bg-gray-200 rounded-lg p-1 mb-4 shadow-inner">
                    <button onClick={() => setHistoryFilter('today')} className={`flex-1 text-[11px] font-bold py-1.5 rounded-md transition ${historyFilter === 'today' ? 'bg-white shadow text-[#2563eb]' : 'text-gray-500 hover:text-gray-700'}`}>วันนี้</button>
                    <button onClick={() => setHistoryFilter('month')} className={`flex-1 text-[11px] font-bold py-1.5 rounded-md transition ${historyFilter === 'month' ? 'bg-white shadow text-[#2563eb]' : 'text-gray-500 hover:text-gray-700'}`}>เดือนนี้</button>
                    <button onClick={() => setHistoryFilter('all')} className={`flex-1 text-[11px] font-bold py-1.5 rounded-md transition ${historyFilter === 'all' ? 'bg-white shadow text-[#2563eb]' : 'text-gray-500 hover:text-gray-700'}`}>ทั้งหมด</button>
                  </div>

                  <div className="bg-white rounded-xl p-4 mb-3 text-gray-800 shadow-sm border border-gray-200 relative overflow-hidden bg-cover bg-center" 
                       style={{ backgroundImage: "url('https://img1.pic.in.th/images/B5392837-DEBE-40E8-B856-E3F6DDD28DB2.jpeg')" }}>
                    <p className="text-xs font-bold text-gray-600 mb-1 relative z-10">สิทธิไทยช่วยไทยพลัส</p>
                    <div className="flex items-baseline mb-3 relative z-10">
                      <span className="text-3xl font-black text-[#3b368c]">{formatNumber(filteredTransactions.reduce((s,t) => s + (t.govtPays || 0), 0))}</span>
                      <span className="ml-2 text-sm font-bold text-gray-500">
                        / {historyFilter === 'today' ? '200' : historyFilter === 'month' ? '1,000' : '4,000'} บาท
                      </span>
                    </div>
                    <div className="flex justify-between text-[10px] sm:text-xs font-bold text-gray-600 border-t border-gray-300/60 pt-2.5 relative z-10">
                      <span>G-Wallet: {formatNumber(filteredTransactions.reduce((s,t) => s + (t.userPays || 0), 0))} บาท</span>
                      <span>จำนวนเงินรวม: {formatNumber(filteredTransactions.reduce((s,t) => s + (t.totalValue || 0), 0))} บาท</span>
                    </div>
                  </div>

                  <div className="bg-gray-100 rounded-xl p-3 mb-4 flex items-start gap-2.5">
                    <Icons.Info className="text-gray-500 shrink-0 w-4 h-4 mt-0.5" />
                    <p className="text-[10px] sm:text-[11px] text-gray-600 font-medium leading-relaxed">
                      สิทธิรัฐช่วยจ่าย 60% ไม่เกินวันละ 200 บาท สูงสุดไม่เกิน 1,000 บาทต่อเดือน ทั้งหมด 4 เดือน รวมทั้งหมด 4,000 บาท<br/><br/>
                      ใช้สิทธิไทยช่วยไทยพลัสได้ตั้งแต่ 06:00 - 23:00 น. สิทธิคงเหลือของแต่ละเดือนจะไม่สะสมไปยังเดือนถัดไปและไม่สามารถทอนเงิน/รับแลกคืนสินค้าหรือบริการเป็นเงินสด
                    </p>
                  </div>

                  <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">
                    {historyFilter === 'all' ? 'ประวัติรายเดือน' : `รายการ (${filteredTransactions.length})`}
                  </h3>
                  
                  {renderHistoryList()}
                </div>
              </div>
            )}

            {deleteConfirmId && (
              <div className="absolute inset-0 z-[100] flex items-center justify-center bg-gray-900/40 backdrop-blur-sm animate-fade-in px-6">
                 <div className="bg-white rounded-[1.5rem] p-5 w-full max-w-[300px] shadow-2xl animate-slide-up text-center border border-gray-100">
                    <div className="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3">
                       <Icons.Trash className="w-7 h-7" />
                    </div>
                    <h3 className="text-base font-black text-gray-800 mb-1.5">ยืนยันลบรายการ?</h3>
                    <p className="text-[11px] text-gray-500 font-medium mb-5 px-2">ข้อมูลที่ถูกลบจะไม่สามารถกู้คืนได้ และยอดโควตาจะถูกคำนวณคืนให้ใหม่</p>
                    <div className="flex gap-2.5">
                       <button onClick={() => setDeleteConfirmId(null)} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold text-xs rounded-xl hover:bg-gray-200 transition active:scale-95">ยกเลิก</button>
                       <button onClick={() => executeDelete(deleteConfirmId)} className="flex-1 py-3 bg-red-500 text-white font-bold text-xs rounded-xl hover:bg-red-600 transition active:scale-95 shadow-lg shadow-red-500/30">ลบข้อมูล</button>
                    </div>
                 </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // [FIX 7] ครอบ App ด้วย ErrorBoundary ก่อน render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
