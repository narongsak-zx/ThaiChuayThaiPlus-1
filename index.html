<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำนวณไทยช่วยไทยพลัส 60/40</title>
  
  <!-- โหลด Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- โหลด React และ ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- โหลด Babel สำหรับแปลง JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- โหลด Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* ซ่อน Scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-100">
  <!-- จุดที่ React จะไปแสดงผล -->
  <div id="root"></div>

  <!-- เขียนโค้ด React (JSX) ไว้ในนี้ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('budget');
      const [inputValue, setInputValue] = useState('');
      const inputRef = useRef(null);
      
      const [result, setResult] = useState({
        userPays: 0,
        govtPays: 0,
        totalValue: 0,
        isMaxReached: false,
        quotaPercent: 0,
      });

      const MAX_GOVT_SUBSIDY = 200;

      useEffect(() => {
        // ให้ Lucide วาดไอคอน
        lucide.createIcons();
      });

      useEffect(() => {
        calculate();
      }, [inputValue, activeTab]);

      const calculate = () => {
        if (!inputValue) {
          setResult({ userPays: 0, govtPays: 0, totalValue: 0, isMaxReached: false, quotaPercent: 0 });
          return;
        }

        const value = parseFloat(inputValue);
        if (isNaN(value) || value <= 0) {
          setResult({ userPays: 0, govtPays: 0, totalValue: 0, isMaxReached: false, quotaPercent: 0 });
          return;
        }

        let actualGovtPays = 0;
        let userPays = 0;
        let totalValue = 0;
        let isMax = false;

        if (activeTab === 'budget') {
          const theoreticalGovtPays = value * 1.5; 
          actualGovtPays = Math.min(theoreticalGovtPays, MAX_GOVT_SUBSIDY);
          totalValue = value + actualGovtPays;
          userPays = value;
          isMax = theoreticalGovtPays > MAX_GOVT_SUBSIDY;

        } else if (activeTab === 'price') {
          const theoreticalGovtPays = value * 0.60;
          actualGovtPays = Math.min(theoreticalGovtPays, MAX_GOVT_SUBSIDY);
          userPays = value - actualGovtPays;
          totalValue = value;
          isMax = theoreticalGovtPays > MAX_GOVT_SUBSIDY;

        } else if (activeTab === 'quota') {
          actualGovtPays = Math.min(value, MAX_GOVT_SUBSIDY);
          totalValue = actualGovtPays / 0.60;
          userPays = totalValue - actualGovtPays;
          isMax = value >= MAX_GOVT_SUBSIDY;
        }

        setResult({
          userPays,
          govtPays: actualGovtPays,
          totalValue,
          isMaxReached: isMax,
          quotaPercent: Math.min((actualGovtPays / MAX_GOVT_SUBSIDY) * 100, 100)
        });
      };

      const handleInputChange = (e) => {
        const val = e.target.value.replace(/[^0-9.]/g, '');
        if ((val.match(/\./g) || []).length <= 1) setInputValue(val);
      };

      const clearInput = () => {
        setInputValue('');
        inputRef.current?.focus();
      };

      const formatNumber = (num) => num.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

      const getTabColor = (tabId) => {
        if (activeTab !== tabId) return 'text-gray-500 hover:text-gray-700 bg-transparent';
        switch (tabId) {
          case 'budget': return 'bg-blue-600 text-white shadow-md';
          case 'price': return 'bg-gray-800 text-white shadow-md';
          case 'quota': return 'bg-green-600 text-white shadow-md';
          default: return 'bg-white text-gray-800';
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-0 sm:p-4 font-sans antialiased">
          <div className="bg-white w-full h-[100dvh] sm:h-[850px] sm:max-w-[400px] flex flex-col relative sm:rounded-[2.5rem] sm:border-[6px] border-gray-900 overflow-hidden shadow-2xl">
            
            {/* Header */}
            <div className="pt-8 pb-4 px-6 bg-white border-b border-gray-100 shrink-0 flex flex-col items-center justify-center">
              <img 
                src="https://media.thaigov.go.th/l3qDHmrj2DNjiur-keUFOlaI2fk=/https://www.thaigov.go.th/uploads/images/275/2026/05/png/20260526091533_3759.png" 
                alt="โลโก้ ไทยช่วยไทยพลัส" 
                className="h-20 w-auto object-contain"
              />
              <p className="text-sm font-bold text-gray-500 text-center mt-1">สัดส่วน 60/40 (รัฐช่วยสูงสุด 200 บ./วัน)</p>
            </div>

            {/* Content */}
            <div className="flex-1 overflow-y-auto px-5 pt-6 pb-40 no-scrollbar bg-gray-50">
              
              {/* Tabs */}
              <div className="flex rounded-xl bg-gray-200 p-1 mb-8 shadow-inner">
                <button onClick={() => { setActiveTab('budget'); setInputValue(''); }} className={`flex-1 flex flex-col items-center justify-center py-3 gap-1.5 rounded-lg transition-all duration-200 ${getTabColor('budget')}`}>
                  <i data-lucide="wallet" className="w-5 h-5"></i>
                  <span className="text-[12px] font-bold tracking-wide">มีเงินจ่าย</span>
                </button>
                <button onClick={() => { setActiveTab('price'); setInputValue(''); }} className={`flex-1 flex flex-col items-center justify-center py-3 gap-1.5 rounded-lg transition-all duration-200 ${getTabColor('price')}`}>
                  <i data-lucide="tag" className="w-5 h-5"></i>
                  <span className="text-[12px] font-bold tracking-wide">ราคาสินค้า</span>
                </button>
                <button onClick={() => { setActiveTab('quota'); setInputValue(''); }} className={`flex-1 flex flex-col items-center justify-center py-3 gap-1.5 rounded-lg transition-all duration-200 ${getTabColor('quota')}`}>
                  <i data-lucide="target" className="w-5 h-5"></i>
                  <span className="text-[12px] font-bold tracking-wide">สิทธิที่เหลือ</span>
                </button>
              </div>

              {/* Input Area */}
              <div className="flex flex-col items-center justify-center mb-8 bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                <label className="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">
                  {activeTab === 'budget' && 'กรอกจำนวนเงินของคุณ (บาท)'}
                  {activeTab === 'price' && 'กรอกราคาสินค้า (บาท)'}
                  {activeTab === 'quota' && 'กรอกสิทธิรัฐที่เหลืออยู่ (บาท)'}
                </label>
                
                <div className="relative w-full flex justify-center items-center">
                  <span className="text-3xl font-bold text-gray-400 mr-2">฿</span>
                  <input
                    ref={inputRef}
                    type="text"
                    inputMode="decimal"
                    value={inputValue}
                    onChange={handleInputChange}
                    className="w-full max-w-[200px] text-center text-5xl font-black text-gray-900 bg-transparent focus:outline-none placeholder-gray-300 p-0"
                    placeholder="0"
                  />
                  {inputValue && (
                    <button onClick={clearInput} className="absolute right-0 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-full p-2 transition-colors">
                      <i data-lucide="x" className="w-4 h-4"></i>
                    </button>
                  )}
                </div>
              </div>

              {/* Receipt Card */}
              <div className="bg-white rounded-2xl p-6 shadow-md border-2 border-gray-100">
                <div className="space-y-5">
                  <div className="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <div className="flex flex-col">
                      <span className="text-sm font-bold text-blue-900">1. เราจ่ายเอง (40%)</span>
                      <span className="text-xs text-blue-600 font-medium mt-0.5">หักจากแอปเป๋าตัง</span>
                    </div>
                    <span className={`text-xl font-black ${inputValue ? 'text-blue-700' : 'text-blue-300'}`}>{formatNumber(result.userPays)}</span>
                  </div>

                  <div className="flex justify-between items-center bg-green-50 p-3 rounded-xl border border-green-100">
                    <div className="flex flex-col">
                      <span className="text-sm font-bold text-green-900">2. รัฐช่วยจ่าย (60%)</span>
                      <span className="text-xs text-green-600 font-medium mt-0.5">ใช้โควตารายวัน</span>
                    </div>
                    <span className={`text-xl font-black ${inputValue ? 'text-green-600' : 'text-green-300'}`}>+{formatNumber(result.govtPays)}</span>
                  </div>

                  <div className="border-t-[3px] border-gray-200 my-1"></div>

                  <div className="flex justify-between items-end pt-1">
                    <span className="text-lg font-extrabold text-gray-900">รวมได้สินค้ามูลค่า</span>
                    <span className={`text-3xl font-black ${inputValue ? 'text-gray-900' : 'text-gray-300'}`}>฿ {formatNumber(result.totalValue)}</span>
                  </div>
                  
                  <div className="pt-4 mt-2 border-t border-gray-100">
                    <div className="flex justify-between text-xs font-bold text-gray-500 mb-2">
                      <span>โควตารัฐวันนี้ (200 บ.)</span>
                      <span className={result.isMaxReached ? 'text-orange-600' : (inputValue ? 'text-green-600' : 'text-gray-400')}>
                        {result.isMaxReached ? 'ใช้เต็ม 200 บ.' : `ใช้ไป ${formatNumber(result.govtPays)} บ.`}
                      </span>
                    </div>
                    <div className="w-full bg-gray-200 h-3 rounded-full overflow-hidden border border-gray-300">
                      <div className={`h-full transition-all duration-300 ${!inputValue ? 'bg-transparent' : (result.isMaxReached ? 'bg-orange-500' : 'bg-green-500')}`} style={{ width: `${result.quotaPercent}%` }}></div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Warning */}
              <div className="mt-5 min-h-[70px]">
                {result.isMaxReached && (
                   <div className="flex items-start gap-3 p-4 bg-orange-100 rounded-xl border-2 border-orange-300 shadow-sm">
                     <i data-lucide="alert-circle" className="text-orange-600 flex-shrink-0 w-6 h-6"></i>
                     <div>
                        <p className="text-sm font-bold text-orange-900">แจ้งเตือนโควตาเต็ม</p>
                        <p className="text-xs text-orange-800 font-medium mt-1">
                          {activeTab === 'quota' && parseFloat(inputValue) > 200 
                            ? 'รัฐช่วยสูงสุด 200 บาท/วัน ระบบคำนวณจากยอดสูงสุดให้แล้ว'
                            : 'ยอดเกินขีดจำกัดรัฐช่วย 200 บาท/วัน ส่วนที่เกินนี้คุณจะต้องเป็นผู้จ่ายเองทั้งหมด'}
                        </p>
                     </div>
                   </div>
                )}
              </div>

            </div>

            {/* Bottom Bar */}
            <div className="absolute bottom-0 left-0 w-full bg-white border-t-4 border-gray-100 px-6 pt-5 pb-8 sm:pb-6 shadow-[0_-15px_30px_rgba(0,0,0,0.08)]">
              <div className="flex items-center justify-between gap-2">
                <div className="flex flex-col">
                  <span className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-1">
                    {activeTab === 'budget' && 'ได้ของมูลค่ารวม'}
                    {activeTab === 'price' && 'สรุปยอดที่ต้องเตรียมจ่าย'}
                    {activeTab === 'quota' && 'ซื้อของได้สูงสุด'}
                  </span>
                  <div className="flex items-baseline">
                    <span className={`text-2xl font-bold mr-1 ${inputValue ? 'text-gray-900' : 'text-gray-300'}`}>฿</span>
                    <span className={`text-4xl font-black tracking-tight ${inputValue ? (activeTab === 'price' ? 'text-blue-700' : 'text-gray-900') : 'text-gray-300'}`}>
                      {inputValue ? (activeTab === 'price' ? formatNumber(result.userPays) : formatNumber(result.totalValue)) : '0'}
                    </span>
                  </div>
                </div>
                
                <a 
                  href={inputValue ? "paotang://" : "#"}
                  className={`h-14 px-5 sm:px-6 rounded-2xl flex items-center justify-center transition-colors duration-300 ${inputValue && !result.isMaxReached ? 'bg-green-500 text-white shadow-lg shadow-green-200 hover:bg-green-600' : (inputValue && result.isMaxReached ? 'bg-orange-500 text-white shadow-lg shadow-orange-200 hover:bg-orange-600' : 'bg-gray-100 text-gray-400 pointer-events-none')}`}
                >
                  <span className="text-base font-bold whitespace-nowrap">ใช้สิทธิ์เลย</span>
                </a>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
