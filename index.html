<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ไทยช่วยไทยพลัส</title>
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"ไทยช่วยไทยพลัส","short_name":"ไทยช่วยไทย","start_url":".","display":"standalone","background_color":"#f9fafb","theme_color":"#ffffff","icons":[{"src":"https://img1.pic.in.th/images/-83_20260603112901.png","sizes":"512x512","type":"image/png","purpose":"any maskable"},{"src":"https://img1.pic.in.th/images/-83_20260603112901.png","sizes":"192x192","type":"image/png","purpose":"any maskable"}]}'>
  <link rel="icon" type="image/png" href="https://img1.pic.in.th/images/-83_20260603112901.png">
  <link rel="apple-touch-icon" href="https://img1.pic.in.th/images/-83_20260603112901.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ไทยช่วยไทย">
  <meta name="theme-color" content="#ffffff">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    html, body {
      overflow: hidden;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0.5rem); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-200 text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ไอคอนต่างๆ ---
    const Icons = {
      Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
      Tag: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42l-8.704-8.704z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>,
      Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      X: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
      Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
      Pen: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
      AlertCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    };

    // --- ฟังก์ชันจัดการเวลาที่ปลอดภัย 100% ---
    const getSafeDateObj = (dateStr, timeStr) => {
      try {
        if (!dateStr || !timeStr) return new Date();
        const [y, m, d] = dateStr.split('-').map(Number);
        const [hr, min] = timeStr.split(':').map(Number);
        const dateObj = new Date(y, m - 1, d, hr, min);
        return isNaN(dateObj.getTime()) ? new Date() : dateObj;
      } catch (e) { return new Date(); }
    };

    const getQuotaDateString = (dateObj = new Date()) => {
      try {
        const d = new Date(dateObj.getTime());
        if (d.getHours() > 23 || (d.getHours() === 23 && d.getMinutes() >= 1)) d.setDate(d.getDate() + 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      } catch (e) {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      }
    };

    const getFullMonthName = (monthStr) => {
      const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
      return months[parseInt(monthStr, 10) - 1] || "";
    };

    const formatGroupHeader = (key, filterType) => {
      try {
        if (filterType === 'month' && key) {
          const [y, m, d] = key.split('-');
          return `${parseInt(d)} ${getFullMonthName(m)} ${parseInt(y) + 543}`;
        } else if (filterType === 'all' && key) {
          const [y, m] = key.split('-');
          return `${getFullMonthName(m)} ${parseInt(y) + 543}`;
        }
        return key || "";
      } catch(e) { return "รายการ"; }
    };

    const formatDisplayDateObj = (d) => {
      try {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear() + 543;
        return `${day}/${month}/${year}`;
      } catch(e) { return ''; }
    };

    const formatDisplayTimeObj = (d) => {
      try {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')} น.`;
      } catch(e) { return ''; }
    };

    const formatNumber = (num) => {
      if (isNaN(num) || num === null || num === undefined) return '0';
      return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('budget');
      const [inputValue, setInputValue] = useState('');
      const inputRef = useRef(null);
      
      const [calcResult, setCalcResult] = useState({ userPays: 0, govtPays: 0, totalValue: 0, isMaxReached: false, quotaPercent: 0 });
      
      const [showHistory, setShowHistory] = useState(false);
      const [historyFilter, setHistoryFilter] = useState('today'); 
      const [expandedMonth, setExpandedMonth] = useState(null); // สำหรับกาง/หุบ เดือนในแท็บทั้งหมด

      const [showToast, setShowToast] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [saveInputValue, setSaveInputValue] = useState('');
      const saveInputRef = useRef(null);
      
      const [selectedDate, setSelectedDate] = useState('');
      const [selectedTime, setSelectedTime] = useState('');

      const [transactions, setTransactions] = useState(() => {
        try {
          const saved = localStorage.getItem('tct_transactions_v2');
          return saved ? JSON.parse(saved) : [];
        } catch(e) { return []; }
      });

      const [currentDateObj, setCurrentDateObj] = useState(new Date());
      const currentQuotaDateStr = getQuotaDateString(currentDateObj);
      
      const MAX_GOVT_SUBSIDY = 200;
      const MAX_MONTHLY_SUBSIDY = 1000;
      const MAX_TOTAL_SUBSIDY = 4000;
      const paotangDeepLink = "paotang://gwallet"; 

      useEffect(() => {
        const timer = setInterval(() => setCurrentDateObj(new Date()), 10000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        localStorage.setItem('tct_transactions_v2', JSON.stringify(transactions));
      }, [transactions]);

      // รีเซ็ตการกางกล่องเดือน เมื่อเปลี่ยนแท็บประวัติ
      useEffect(() => {
        setExpandedMonth(null);
      }, [historyFilter]);

      const totalUsed = transactions.reduce((sum, t) => sum + (t.govtPays || 0), 0);
      const remainingTotalQuota = Math.max(0, MAX_TOTAL_SUBSIDY - totalUsed);

      const currentQuotaMonth = currentQuotaDateStr.substring(0, 7); 
      const thisMonthTransactions = transactions.filter(t => (t.quotaDate || '').startsWith(currentQuotaMonth));
      const usedQuotaMonth = thisMonthTransactions.reduce((sum, t) => sum + (t.govtPays || 0), 0);
      
      const theoreticalRemainingMonthly = Math.max(0, MAX_MONTHLY_SUBSIDY - usedQuotaMonth);
      const remainingMonthlyQuota = Math.min(theoreticalRemainingMonthly, remainingTotalQuota);

      const todaysTransactions = transactions.filter(t => t.quotaDate === currentQuotaDateStr);
      const usedQuotaToday = todaysTransactions.reduce((sum, t) => sum + (t.govtPays || 0), 0);
      
      const theoreticalRemainingDaily = Math.max(0, MAX_GOVT_SUBSIDY - usedQuotaToday);
      const remainingQuota = Math.min(theoreticalRemainingDaily, remainingMonthlyQuota);
      const maxPurchasingPower = remainingQuota / 0.60;

      // ==========================================
      // 1. เครื่องคิดเลขหลัก
      // ==========================================
      useEffect(() => {
        const parsedValue = parseFloat(inputValue);
        if (!inputValue || isNaN(parsedValue) || parsedValue <= 0) {
          setCalcResult({ userPays: 0, govtPays: 0, totalValue: 0, isMaxReached: false, quotaPercent: 0 });
          return;
        }

        let gPays = 0, uPays = 0, tValue = 0, isMax = false;

        if (activeTab === 'budget') {
          const theoretical = parsedValue * 1.5; 
          gPays = Math.min(theoretical, MAX_GOVT_SUBSIDY);
          tValue = parsedValue + gPays;
          uPays = parsedValue;
          isMax = theoretical > MAX_GOVT_SUBSIDY;
        } else if (activeTab === 'price') {
          const theoretical = parsedValue * 0.60;
          gPays = Math.min(theoretical, MAX_GOVT_SUBSIDY);
          uPays = parsedValue - gPays;
          tValue = parsedValue;
          isMax = theoretical > MAX_GOVT_SUBSIDY;
        } else if (activeTab === 'quota') {
          gPays = Math.min(parsedValue, MAX_GOVT_SUBSIDY);
          tValue = gPays / 0.60;
          uPays = tValue - gPays;
          isMax = false;
        }

        const qPercent = Math.min((gPays / MAX_GOVT_SUBSIDY) * 100, 100);
        setCalcResult({ userPays: uPays, govtPays: gPays, totalValue: tValue, isMaxReached: isMax, quotaPercent: qPercent });
      }, [inputValue, activeTab]); 

      // ==========================================
      // 2. หน้าต่างบันทึกยอด
      // ==========================================
      const selectedDateTimeObj = getSafeDateObj(selectedDate, selectedTime);
      const selectedQuotaDateStr = getQuotaDateString(selectedDateTimeObj);
      const selectedQuotaMonthStr = selectedQuotaDateStr.substring(0, 7);

      const targetTotalRemain = remainingTotalQuota; 

      const targetMonthTxs = transactions.filter(t => (t.quotaDate || '').startsWith(selectedQuotaMonthStr));
      const targetMonthUsed = targetMonthTxs.reduce((sum, t) => sum + (t.govtPays || 0), 0);
      const targetMonthRemainTheory = Math.max(0, MAX_MONTHLY_SUBSIDY - targetMonthUsed);
      const targetMonthRemain = Math.min(targetMonthRemainTheory, targetTotalRemain);

      const targetDayTxs = transactions.filter(t => t.quotaDate === selectedQuotaDateStr);
      const targetDayUsed = targetDayTxs.reduce((sum, t) => sum + (t.govtPays || 0), 0);
      const targetDayRemainTheory = Math.max(0, MAX_GOVT_SUBSIDY - targetDayUsed);
      
      const targetFinalRemain = Math.min(targetDayRemainTheory, targetMonthRemain);

      let saveGovtPaysPreview = 0, saveUserPaysPreview = 0, saveTotalValuePreview = parseFloat(saveInputValue) || 0;

      if (saveTotalValuePreview > 0) {
        const theoretical = saveTotalValuePreview * 0.60;
        saveGovtPaysPreview = Math.min(theoretical, targetFinalRemain);
        saveUserPaysPreview = saveTotalValuePreview - saveGovtPaysPreview;
      }

      // --- Handlers ---
      const handleInputChange = (e) => {
        const val = e.target.value.replace(/[^0-9.]/g, '');
        if ((val.match(/\./g) || []).length > 1) return;
        if (activeTab === 'quota') {
           const numVal = parseFloat(val);
           if (!isNaN(numVal) && numVal > MAX_GOVT_SUBSIDY) return; 
        }
        setInputValue(val);
      };

      const handleSaveInputChange = (e) => {
        const val = e.target.value.replace(/[^0-9.]/g, '');
        if ((val.match(/\./g) || []).length <= 1) setSaveInputValue(val);
      };

      const clearInput = () => {
        setInputValue('');
        inputRef.current?.focus();
      };

      const changeTab = (tabId) => {
        setActiveTab(tabId);
        setInputValue('');
      };

      const confirmSaveTransaction = () => {
        if (!saveInputValue || saveTotalValuePreview <= 0) return;

        const finalTimestamp = isNaN(selectedDateTimeObj.getTime()) ? new Date().toISOString() : selectedDateTimeObj.toISOString();

        const newTx = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          quotaDate: selectedQuotaDateStr, 
          timestamp: finalTimestamp, 
          userPays: saveUserPaysPreview,
          govtPays: saveGovtPaysPreview,
          totalValue: saveTotalValuePreview,
          inputType: 'manual_save'
        };

        setTransactions(prev => [newTx, ...prev].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
        setShowSaveModal(false);
        setSaveInputValue('');
        
        setToastMsg(`บันทึกยอด ${formatNumber(saveTotalValuePreview)} บ. สำเร็จ!`);
        setShowToast(true);
        setTimeout(() => setShowToast(false), 2500);
      };

      const handleDelete = (id) => {
        setTransactions(prev => prev.filter(t => t.id !== id));
      };

      const getTabColor = (tabId) => {
        if (activeTab !== tabId) return 'text-gray-500 hover:text-gray-600 bg-transparent';
        switch (tabId) {
          case 'budget': return 'bg-blue-600 text-white shadow-sm';
          case 'price': return 'bg-gray-800 text-white shadow-sm';
          case 'quota': return 'bg-emerald-600 text-white shadow-sm';
          default: return 'bg-white text-gray-800';
        }
      };

      const openSaveModal = () => {
        setSaveInputValue('');
        const now = new Date();
        setSelectedDate(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`);
        setSelectedTime(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
        setShowSaveModal(true);
      };

      // --- ระบบจัดกลุ่มประวัติ ---
      const filteredTransactions = transactions.filter(t => {
        if (!t.quotaDate) return false;
        if (historyFilter === 'today') return t.quotaDate === currentQuotaDateStr;
        if (historyFilter === 'month') return t.quotaDate.startsWith(currentQuotaMonth);
        return true; 
      });

      // ฟังก์ชันสำหรับจัดกลุ่ม
      const renderHistoryList = () => {
        if (filteredTransactions.length === 0) {
          return (
            <div className="text-center py-10">
              <div className="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-3 text-gray-400"><Icons.History /></div>
              <p className="text-sm text-gray-500 font-medium">ยังไม่มีการบันทึกรายการ</p>
            </div>
          );
        }

        // กรณี "วันนี้" โชว์ลิสต์ยาวปกติ
        if (historyFilter === 'today') {
           return (
             <div className="space-y-2">
                {filteredTransactions.map(tx => (
                  <div key={tx.id} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-[9px] font-bold text-white bg-gray-800 px-2 py-0.5 rounded-md">
                          {formatDisplayTimeObj(new Date(tx.timestamp))}
                        </span>
                      </div>
                      <p className="text-xs font-bold text-gray-800 mb-0.5">จำนวนเงินรวม ฿{formatNumber(tx.totalValue)}</p>
                      <p className="text-[10px] text-gray-500 font-medium">
                        เป๋าตัง ฿{formatNumber(tx.userPays)} | รัฐช่วย <span className="text-emerald-600 font-bold">฿{formatNumber(tx.govtPays)}</span>
                      </p>
                    </div>
                    <button onClick={() => handleDelete(tx.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition active:scale-95" aria-label="ลบรายการ">
                      <Icons.Trash />
                    </button>
                  </div>
                ))}
             </div>
           );
        }

        // กรณี "เดือนนี้" โชว์แยกเป็นวันๆ
        if (historyFilter === 'month') {
           const daysObj = {};
           filteredTransactions.forEach(tx => {
             if (!daysObj[tx.quotaDate]) daysObj[tx.quotaDate] = [];
             daysObj[tx.quotaDate].push(tx);
           });
           const sortedDays = Object.keys(daysObj).sort((a,b) => b.localeCompare(a));
           
           return (
             <div className="space-y-4">
                {sortedDays.map(dayKey => (
                  <div key={dayKey}>
                    <h4 className="text-[11px] font-extrabold text-gray-500 mb-2 px-1 border-b border-gray-200 pb-1">
                      {formatGroupHeader(dayKey, 'month')}
                    </h4>
                    <div className="space-y-2">
                      {daysObj[dayKey].map(tx => (
                        <div key={tx.id} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition">
                          <div>
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-[9px] font-bold text-white bg-gray-800 px-2 py-0.5 rounded-md">
                                {formatDisplayTimeObj(new Date(tx.timestamp))}
                              </span>
                            </div>
                            <p className="text-xs font-bold text-gray-800 mb-0.5">จำนวนเงินรวม ฿{formatNumber(tx.totalValue)}</p>
                            <p className="text-[10px] text-gray-500 font-medium">
                              เป๋าตัง ฿{formatNumber(tx.userPays)} | รัฐช่วย <span className="text-emerald-600 font-bold">฿{formatNumber(tx.govtPays)}</span>
                            </p>
                          </div>
                          <button onClick={() => handleDelete(tx.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition active:scale-95" aria-label="ลบรายการ">
                            <Icons.Trash />
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
             </div>
           );
        }

        // กรณี "ทั้งหมด" โชว์เป็นกล่องรายเดือน พอกดค่อยกางออกเป็นรายวัน
        if (historyFilter === 'all') {
           const monthsObj = {};

                    </div>
                    {historyFilter !== 'all' && (
                      <div className="flex justify-between text-[10px] sm:text-xs font-semibold text-gray-300 border-t border-gray-700 pt-2.5 relative z-10">
                        <span>ใช้เป๋าตังไปแล้ว: ฿{formatNumber(filteredTransactions.reduce((s,t) => s + (t.userPays || 0), 0))}</span>
                        <span>จำนวนเงินรวม: ฿{formatNumber(filteredTransactions.reduce((s,t) => s + (t.totalValue || 0), 0))}</span>
                      </div>
                    )}
                  </div>

                  <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">
                    {historyFilter === 'all' ? 'ประวัติรายเดือน' : `รายการ (${filteredTransactions.length})`}
                  </h3>
                  
                  {renderHistoryList()}

                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
